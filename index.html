<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoGuessr 朋友破冰版 v2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #121214; color: #fff; -webkit-user-select: none; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .active { display: flex !important; }
        
        .card { background: #202024; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #323238; background: #121214; color: #fff; border-radius: 6px; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background: #00b0ff; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0091ea; }
        button:disabled { background: #4c4c52; cursor: not-allowed; }

        #game-screen { display: none; flex-direction: column; height: 100%; }
        #header { height: 60px; background: #202024; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-weight: bold; }
        #timer { font-size: 24px; color: #ffd166; }
        #img-box { height: 38%; background: #000; display: flex; justify-content: center; align-items: center; }
        #img-box img { max-height: 100%; max-width: 100%; object-fit: contain; }
        #map { height: 48%; width: 100%; z-index: 1; }
        #lock-btn { height: 8%; width: 100%; background: #06d6a0; font-size: 18px; }

        .rank-list { width: 100%; max-width: 500px; background: #202024; border-radius: 12px; padding: 20px; overflow-y: auto; max-height: 50vh; margin: 15px 0; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #323238; font-size: 18px; }
        .rank-item:first-child { color: #ffd166; font-weight: bold; }
        .status-msg { margin-top: 10px; color: #a4a4a8; font-style: italic; }
        .host-control { background: #ff5722; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="card">
            <h2>GeoGuessr 朋友破冰</h2>
            <p style="color: #a4a4a8; margin-top: 5px;">輸入暱稱加入房間</p>
            <input type="text" id="username-input" placeholder="你的名字 (關主請輸入 boss)" maxlength="10">
            <button id="join-btn" onclick="joinRoom()">加入遊戲</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="card">
            <h3 style="color:#00b0ff;">🎮 遊戲大廳 Waiting...</h3>
            <p style="margin: 20px 0; font-size: 18px;">目前已進房人數：<span id="lobby-count" style="font-weight:bold; color:#ffd166;">0</span> 人</p>
            
            <div id="host-lobby-zone" style="display:none;">
                <button class="host-control" onclick="hostChangeState('playing', 0)">主辦方：正式開始第一題</button>
            </div>
            
            <p class="status-msg" id="lobby-guest-msg">等待關主發起遊戲，請勿離開此畫面...</p>
        </div>
    </div>

    <div id="game-screen">
        <div id="header">
            <div>題號: <span id="round-num">1</span>/20</div>
            <div id="timer">20s</div>
            <div>得分: <span id="my-score">0</span></div>
        </div>
        <div id="img-box">
            <img id="current-img" src="" alt="題目相片">
        </div>
        <div id="map"></div>
        <button id="lock-btn" onclick="lockAnswer()">鎖定此地點！</button>
    </div>

    <div id="rank-screen" class="screen">
        <h2 id="rank-title" style="color:#ffd166;">第 1 輪 結束排行</h2>
        <div class="rank-list" id="rank-container"></div>
        
        <div id="host-rank-zone" style="display:none; width:100%; max-width:500px;">
            <button id="host-next-btn" class="host-control" onclick="hostNextRound()">主辦方：進入下一題</button>
        </div>

        <p class="status-msg" id="next-round-hint">等待關主切換下一輪...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // 🛠️ CONFIG 區塊：請務必貼回你原本的 Firebase 設定
        // ==========================================
        const firebaseConfig = {
                  apiKey: "AIzaSyCLVPqDnLhjF_pj0sISOR73YFciNyeAd4I",
                  authDomain: "my-map-game-fd694.firebaseapp.com",
                  databaseURL: "https://my-map-game-fd694-default-rtdb.asia-southeast1.firebasedatabase.app",
                  projectId: "my-map-game-fd694",
                  storageBucket: "my-map-game-fd694.firebasestorage.app",
                  messagingSenderId: "749340315291",
                  appId: "1:749340315291:web:f6486949cbef4d5287403e",
                  measurementId: "G-WFZ8HPJJ2H"
        };
	firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🔐 關主永久金鑰（如果名字打這個，不管斷線幾次都會判定成關主）
        const HOST_PASSWORD = "boss"; 

        // ==========================================
        // 🗺️ 題庫資料
        // ==========================================
        const quizData = [
            { id: "1PYcSps-jN60FowJK3D4GatANPhapoAgR", lat: 25.032106, lng: 121.592934 },
            { id: "1yB86RcQ7mOLdNRYo_yACGckFFLWqFwB8", lat: 23.491339, lng: 120.447616 },
            { id: "1VaQ4A7liwK48rH3TI9KbcpzGzYqjqSw4", lat: 24.952717, lng: 121.357082 },
            { id: "1oLFhBnjr3ILCFd6gK9XKwM4whxHanHQ5", lat: 25.164304, lng: 121.577856 },
            { id: "19UCum3_aUbf5xLN0YrkQLRjvMaOsJd5y", lat: 25.017071, lng: 121.214192 },
            { id: "1238R1vpAIqMBaJI0O8o_Eal8nTOx6aWE", lat: 24.972103, lng: 121.531156 },
            { id: "1hdbjo_HZCvdKn7A3etgu2tBz1CLShzOw", lat: 22.652979, lng: 121.474908 },
            { id: "1Py8vNU3KV0RsPnxiqa6EWjyLvD8-kyJL", lat: 24.820611, lng: 121.177894 },
            { id: "1zFRrmHH8L8ecco1CxqmMUZoZz47cVWUJ", lat: 22.753066, lng: 121.147085 },
            { id: "1vr_BN2Sx_ICoAxmueZ6LjAjWkRVQwwhU", lat: 25.108544, lng: 121.843560 },
            { id: "1SGuJjOahCaZuoENRIPmjjFGuOJ_l_nxK", lat: 25.073916, lng: 121.375597 },
            { id: "1s5TsUEJ9NlaT6noUJd-PjFETifTSscmJ", lat: 24.453292, lng: 120.847200 },
            { id: "1bQe7o6MG6FNqHRMYRr8l87Mu6FhIepJg", lat: 25.048922, lng: 121.524233 },
            { id: "1zSoOiVHY7mAM_WKfjsZOkl9rEiRBa5oV", lat: 25.083411, lng: 121.554978 },
            { id: "1Yq2EZeJTnf39Ewe1fE6hBJ82od9hRmSk", lat: 24.882717, lng: 121.326442 },
            { id: "1mCTDVhU77uGDJr8rgHJtI36WC_zGlBFe", lat: 25.051178, lng: 121.550703 },
            { id: "1PZTiWllEzHIu2L1H3WeOsE7tzVqF-KmE", lat: 25.042486, lng: 121.502225 },
            { id: "1GatxJFcz895c6ji011_cPyojiCjGNPsM", lat: 25.077919, lng: 121.392861 },
            { id: "1X-49h825yFalk9-CrQxswCz37pwy5YQc", lat: 24.936092, lng: 121.214183 },
            { id: "1dhaTbHWUKeiZ0rKw0R4r844TfYBA3N82", lat: 24.793036, lng: 120.973281 }
        ];

        let myName = "";
        let map, guessMarker, correctMarker, linePath;
        let currentGuess = null;
        let totalScore = 0;
        let hasLocked = false;
        let isHost = false;
        let activeRound = 0;
        let hostClockInterval = null;

        // --- 🤖 手機端點擊圖釘優化配置 ---
        function initMap() {
            if (map) return;
            map = L.map('map', { 
                zoomControl: false,
                tap: false // 關閉 Leaflet 預設舊型 tap 攔截，交由原生事件處理
            }).setView([23.97, 120.97], 7);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            const bounds = L.latLngBounds([21.0, 118.0], [26.5, 123.5]);
            map.setMaxBounds(bounds);

            // 同時監聽 click 與手機端觸控結束，確保 100% 抓到經緯度
            function handleMapClick(e) {
                if (hasLocked) return;
                currentGuess = e.latlng;
                if (guessMarker) {
                    guessMarker.setLatLng(currentGuess);
                } else {
                    guessMarker = L.marker(currentGuess).addTo(map);
                }
            }
            map.on('click', handleMapClick);
        }

        // --- 核心房間登入邏輯 ---
        function joinRoom() {
            const input = document.getElementById('username-input').value.trim();
            if (!input) return alert("請輸入暱稱！");
            myName = input;

            // 判斷是否為金鑰關主
            if (myName.toLowerCase() === HOST_PASSWORD.toLowerCase()) {
                isHost = true;
                document.getElementById('host-lobby-zone').style.display = 'block';
                document.getElementById('host-rank-zone').style.display = 'block';
                document.getElementById('lobby-guest-msg').innerText = "🔑 您已身為認證關主，請等待玩家到齊後點擊開始。";
            }

            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('lobby-screen').classList.add('active');

            // 如果是新房間，初始化狀態機大腦
            db.ref('room/state').once('value', snapshot => {
                if (!snapshot.exists()) {
                    db.ref('room/state').set({ status: "lobby", round: 0, timer: 20 });
                }
            });

            // 註冊或重連玩家節點
            db.ref(`room/players/${myName}`).once('value', snapshot => {
                if (!snapshot.exists()) {
                    db.ref(`room/players/${myName}`).set({ score: 0, lastScore: 0 });
                } else {
                    totalScore = snapshot.val().score || 0;
                    document.getElementById('my-score').innerText = totalScore;
                }
            });

            // 監聽線上人數
            db.ref('room/players').on('value', snapshot => {
                if(snapshot.exists()) {
                    document.getElementById('lobby-count').innerText = Object.keys(snapshot.val()).length;
                }
            });

            // 監聽即時同步狀態機（支援隨時中途加入）
            db.ref('room/state').on('value', snapshot => {
                const state = snapshot.val();
                if (!state) return;

                activeRound = state.round;

                // 如果身為關主重啟/斷線回來，幫他接回計時器大腦
                if (isHost && state.status === "playing" && !hostClockInterval) {
                    resumeHostClock(state.round, state.timer);
                }

                if (state.status === "lobby") {
                    switchScreen('lobby-screen');
                } else if (state.status === "playing") {
                    startRoundUI(state.round, state.timer);
                } else if (state.status === "ranking") {
                    showRankUI(state.round, state.timer);
                } else if (state.status === "finished") {
                    showFinalUI();
                }
            });
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').style.display = 'none';
            if (id === 'game-screen') document.getElementById('game-screen').style.display = 'flex';
            else document.getElementById(id).classList.add('active');
        }

        function startRoundUI(roundIdx, serverTimer) {
            switchScreen('game-screen');
            initMap();
            
            if (correctMarker) map.removeLayer(correctMarker);
            if (linePath) map.removeLayer(linePath);
            
            // 修正手機版：如果玩家中途加入或還沒鎖定，保留或重置按鈕
            if (!hasLocked) {
                document.getElementById('lock-btn').disabled = false;
                document.getElementById('lock-btn').style.background = "#06d6a0";
                document.getElementById('lock-btn').innerText = "鎖定此地點！";
            }
            
            document.getElementById('round-num').innerText = roundIdx + 1;
            document.getElementById('timer').innerText = serverTimer + "s";
            document.getElementById('current-img').src = `https://drive.google.com/uc?export=view&id=${quizData[roundIdx].id}`;
            
            if (serverTimer <= 0 && !hasLocked) {
                lockAnswer(true); // 時間到自動強制結算
            }
        }

        function lockAnswer(isAutoTimeout = false) {
            hasLocked = true;
            document.getElementById('lock-btn').disabled = true;
            document.getElementById('lock-btn').style.background = "#4c4c52";
            document.getElementById('lock-btn').innerText = isAutoTimeout ? "時間到！已自動送出" : "已鎖定，等待時間結束...";

            let roundScore = 0;
            const target = quizData[activeRound];

            if (currentGuess) {
                const dist = getDistance(currentGuess.lat, currentGuess.lng, target.lat, target.lng);
                roundScore = Math.max(0, 5000 - Math.round(dist * 12));
                totalScore += roundScore;
            }

            document.getElementById('my-score').innerText = totalScore;
            db.ref(`room/players/${myName}`).update({ score: totalScore, lastScore: roundScore });
        }

        function showRankUI(roundIdx, serverTimer) {
            switchScreen('rank-screen');
            document.getElementById('rank-title').innerText = `第 ${roundIdx + 1} 輪 結束排行`;
            
            if (isHost) {
                document.getElementById('next-round-hint').innerText = "👑 您是關主，請點擊下方按鈕推進下一關。";
            } else {
                document.getElementById('next-round-hint').innerText = "等待關主開啟下一輪題目...";
            }

            db.ref('room/players').once('value', snapshot => {
                const players = snapshot.val() || {};
                const sorted = Object.keys(players)
                    .map(key => ({ name: key, ...players[key] }))
                    .sort((a, b) => b.score - a.score);

                const container = document.getElementById('rank-container');
                container.innerHTML = "";
                sorted.forEach((p, idx) => {
                    container.innerHTML += `
                        <div class="rank-item">
                            <span>#${idx+1} ${p.name}</span>
                            <span>${p.score}分 (+${p.lastScore || 0})</span>
                        </div>`;
                });
            });

            // 在地圖底層畫出標準答案連線，供玩家回到答題分頁看或留存
            if (map && currentGuess) {
                const target = quizData[roundIdx];
                if (!correctMarker) {
                    correctMarker = L.marker([target.lat, target.lng], {
                        icon: L.icon({
                            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
                            iconSize: [25, 41], iconAnchor: [12, 41]
                        })
                    }).addTo(map);
                    linePath = L.polyline([currentGuess, [target.lat, target.lng]], {color: 'red'}).addTo(map);
                }
            }
            hasLocked = false; // 為下一輪重置狀態
        }

        function showFinalUI() {
            switchScreen('rank-screen');
            document.getElementById('rank-title').innerText = `🏆 最終大結算 🏆`;
            document.getElementById('next-round-hint').innerText = "🎉 破冰遊戲圓滿結束！";
            if(isHost) document.getElementById('host-rank-zone').style.display = 'none';
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ==========================================
        // 👑 關主核心時鐘大腦邏輯
        // ==========================================
        function hostChangeState(status, round, timer = 20) {
            if (!isHost) return;
            db.ref('room/state').set({ status: status, round: round, timer: timer });
            
            if (status === 'playing') {
                runHostClock(round, timer);
            }
        }

        function runHostClock(roundIdx, duration) {
            if (hostClockInterval) clearInterval(hostClockInterval);
            let currentTimer = duration;

            hostClockInterval = setInterval(() => {
                currentTimer--;
                db.ref('room/state').update({ timer: currentTimer });
                
                if (currentTimer <= 0) {
                    clearInterval(hostClockInterval);
                    hostClockInterval = null;
                    // 時間到，自動切入排行榜結算狀態
                    db.ref('room/state').update({ status: "ranking" });
                }
            }, 1000);
        }

        // 處理關主中途斷線、重新整理網頁回來的「時鐘接管」
        function resumeHostClock(roundIdx, remainingTime) {
            if (remainingTime > 0) {
                runHostClock(roundIdx, remainingTime);
            }
        }

        function hostNextRound() {
            if (!isHost) return;
            if (hostClockInterval) clearInterval(hostClockInterval);
            
            let nextRound = activeRound + 1;
            if (nextRound >= quizData.length) {
                db.ref('room/state').update({ status: "finished" });
            } else {
                // 重置每位玩家的單回合分數緩衝
                db.ref('room/players').once('value', snapshot => {
                    const players = snapshot.val() || {};
                    Object.keys(players).forEach(name => {
                        db.ref(`room/players/${name}`).update({ lastScore: 0 });
                    });
                });
                hostChangeState('playing', nextRound, 20);
            }
        }
    </script>
</body>
</html>
