<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoGuessr 朋友破冰版 v4.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #121214; color: #fff; -webkit-user-select: none; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .active { display: flex !important; }
        
        .card { background: #202024; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #323238; background: #121214; color: #fff; border-radius: 6px; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background: #00b0ff; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0091ea; }
        button:disabled { background: #4c4c52; cursor: not-allowed; }

        #game-screen { display: none; flex-direction: column; height: 100%; }
        #header { height: 60px; background: #202024; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-weight: bold; z-index: 10; }
        #timer { font-size: 24px; color: #ffd166; }
        #img-box { height: 38%; background: #000; display: flex; justify-content: center; align-items: center; position: relative; }
        #img-box img { max-height: 100%; max-width: 100%; object-fit: contain; }
        #map { height: 48%; width: 100%; z-index: 1; }
        #lock-btn { height: 8%; width: 100%; background: #06d6a0; font-size: 18px; z-index: 10; }

        .rank-list { width: 100%; max-width: 500px; background: #202024; border-radius: 12px; padding: 20px; overflow-y: auto; max-height: 45vh; margin: 15px 0; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #323238; font-size: 18px; }
        .rank-item:first-child { color: #ffd166; font-weight: bold; }
        .status-msg { margin-top: 10px; color: #a4a4a8; font-style: italic; text-align: center; }
        .host-control { background: #ff5722; margin-top: 10px; }
        .host-reset { background: #dc3545; margin-top: 10px; }
        
        #reveal-panel { position: absolute; top: 10px; left: 10px; right: 10px; background: rgba(32, 32, 36, 0.95); padding: 15px; border-radius: 8px; z-index: 1000; text-align: center; border: 1px solid #323238; display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div class="card">
            <h2>GeoGuessr 朋友破冰</h2>
            <p style="color: #a4a4a8; margin-top: 5px;">輸入暱稱加入房間</p>
            <input type="text" id="username-input" placeholder="你的名字 (關主請輸入 boss)" maxlength="10">
            <button id="join-btn" onclick="joinRoom()">加入遊戲</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="card">
            <h3 style="color:#00b0ff;">🎮 遊戲大廳 Waiting...</h3>
            <p style="margin: 20px 0; font-size: 18px;">目前已進房人數：<span id="lobby-count" style="font-weight:bold; color:#ffd166;">0</span> 人</p>
            
            <div id="host-lobby-zone" style="display:none;">
                <button class="host-control" onclick="hostChangeState('playing', 0, 30)">主辦方：正式開始第一題</button>
                <button class="host-reset" onclick="hostResetEntireGame()">主辦方：強制重置整房並踢出玩家</button>
            </div>
            
            <p class="status-msg" id="lobby-guest-msg">等待關主發起遊戲，請勿離開此畫面...</p>
        </div>
    </div>

    <div id="game-screen">
        <div id="header">
            <div>題號: <span id="round-num">1</span>/<span id="total-rounds">31</span></div>
            <div id="timer">30s</div>
            <div>得分: <span id="my-score">0</span></div>
        </div>
        
        <div id="reveal-panel">
            <h3 style="color: #06d6a0; margin-bottom: 5px;">📍 本輪正確答案已揭曉</h3>
            <p id="reveal-dist-text">誤差距離：-- 公里</p>
            <div id="host-reveal-zone" style="display:none;">
                <button class="host-control" style="padding: 6px 12px; font-size: 14px;" onclick="hostChangeState('ranking', activeRound)">主辦方：查看即時排行</button>
            </div>
        </div>

        <div id="img-box">
            <img id="current-img" src="" alt="題目相片">
        </div>
        <div id="map"></div>
        <button id="lock-btn" onclick="lockAnswer()">鎖定此地點！</button>
    </div>

    <div id="rank-screen" class="screen">
        <h2 id="rank-title" style="color:#ffd166;">第 1 輪 結束排行</h2>
        <div class="rank-list" id="rank-container"></div>
        
        <div id="host-rank-zone" style="display:none; width:100%; max-width:500px;">
            <button id="host-next-btn" class="host-control" onclick="hostNextRound()">主辦方：進入下一題</button>
            <button class="host-reset" onclick="hostResetEntireGame()">主辦方：結束並重新重置整房</button>
        </div>

        <p class="status-msg" id="next-round-hint">等待關主切換下一輪...</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // 🛠️ CONFIG 區塊：請貼回你的 Firebase 設定
        // ==========================================
        const firebaseConfig = {
                  apiKey: "AIzaSyCLVPqDnLhjF_pj0sISOR73YFciNyeAd4I",
                  authDomain: "my-map-game-fd694.firebaseapp.com",
                  databaseURL: "https://my-map-game-fd694-default-rtdb.asia-southeast1.firebasedatabase.app",
                  projectId: "my-map-game-fd694",
                  storageBucket: "my-map-game-fd694.firebasestorage.app",
                  messagingSenderId: "749340315291",
                  appId: "1:749340315291:web:f6486949cbef4d5287403e",
                  measurementId: "G-WFZ8HPJJ2H"
        };
	firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const HOST_PASSWORD = "boss"; 

        const quizData = [
            { file: "20230709_150126.jpg", lat: 25.032106, lng: 121.592934 },
            { file: "20231008_190747.jpg", lat: 23.491339, lng: 120.447616 },
            { file: "20231014_171148.jpg", lat: 24.952717, lng: 121.357082 },
            { file: "20231104_171346.jpg", lat: 25.164304, lng: 121.577856 },
            { file: "20240615_102207.jpg", lat: 25.017071, lng: 121.214192 },
            { file: "20240713_141239.jpg", lat: 24.972103, lng: 121.531156 },
            { file: "20240727_174704.jpg", lat: 22.652979, lng: 121.474908 },
            { file: "20240915_093548.jpg", lat: 24.820611, lng: 121.177894 },
            { file: "20241010_204711.jpg", lat: 22.753066, lng: 121.147085 },
            { file: "20250628_154254.jpg", lat: 25.108544, lng: 121.843560 },
            { file: "20250913_185432.jpg", lat: 25.073916, lng: 121.375597 },
            { file: "PXL_20251025_011255164.jpg", lat: 24.453292, lng: 120.847200 },
            { file: "PXL_20251122_054850437.jpg", lat: 25.048922, lng: 121.524233 },
            { file: "PXL_20251122_122313977.TS-000.MP.jpg", lat: 25.083411, lng: 121.554978 },
            { file: "PXL_20251129_043719259.MP.jpg", lat: 24.882717, lng: 121.326442 },
            { file: "PXL_20251220_023604951.TS-000.jpg", lat: 25.051178, lng: 121.550703 },
            { file: "PXL_20251220_062533161.TS-000.jpg", lat: 25.042486, lng: 121.502225 },
            { file: "PXL_20251227_115304895.TS-000.MP.jpg", lat: 25.077919, lng: 121.392861 },
            { file: "PXL_20260314_104654093.jpg", lat: 24.936092, lng: 121.214183 },
            { file: "PXL_20260321_084933273.MP.jpg", lat: 24.793036, lng: 120.973281 },
            { file: "1713708448695.jpg", lat: 25.050606, lng: 121.560149 },
            { file: "1722347231690.jpg", lat: 22.655983, lng: 121.474149 },
            { file: "1751109088715.jpg", lat: 25.112896, lng: 121.919966 },
            { file: "1757761460555.jpg", lat: 25.074364, lng: 121.375577 },
            { file: "1758447316274.jpg", lat: 25.044673, lng: 121.503199 },
            { file: "1777209107392.jpg", lat: 25.037559, lng: 121.563825 },
            { file: "DSCF6169.jpg", lat: 25.169056, lng: 121.441545 },
            { file: "FB_IMG_1731288326902.jpg", lat: 24.839615, lng: 121.183837 },
            { file: "FB_IMG_1745319859537.jpg", lat: 25.097950, lng: 121.371808 },
            { file: "FB_IMG_1762762326096.jpg", lat: 25.093549, lng: 121.571385 },
            { file: "FB_IMG_1782644906744.jpg", lat: 25.102456, lng: 121.316919 }
        ];

        let myName = "";
        let map, guessMarker, correctMarker, linePath;
        let currentGuess = null;
        let totalScore = 0;
        let hasLocked = false;
        let isHost = false;
        let activeRound = 0;
        let hostClockInterval = null;

        document.getElementById('total-rounds').innerText = quizData.length;

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, tap: false }).setView([23.97, 120.97], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            const bounds = L.latLngBounds([21.0, 118.0], [26.5, 123.5]);
            map.setMaxBounds(bounds);

            map.on('click', (e) => {
                if (hasLocked) return;
                currentGuess = e.latlng;
                if (guessMarker) guessMarker.setLatLng(currentGuess);
                else guessMarker = L.marker(currentGuess).addTo(map);
            });
        }

        function joinRoom() {
            const input = document.getElementById('username-input').value.trim();
            if (!input) return alert("請輸入暱稱！");
            myName = input;

            if (myName.toLowerCase() === HOST_PASSWORD.toLowerCase()) {
                isHost = true;
                document.getElementById('host-lobby-zone').style.display = 'block';
                document.getElementById('host-rank-zone').style.display = 'block';
                document.getElementById('host-reveal-zone').style.display = 'block';
                document.getElementById('lobby-guest-msg').innerText = "🔑 您已身為認證關主，請等待玩家到齊後點擊開始。";
            }

            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('lobby-screen').classList.add('active');
            document.getElementById('join-btn').disabled = true;

            db.ref('room/state').once('value', snapshot => {
                if (!snapshot.exists()) {
                    db.ref('room/state').set({ status: "lobby", round: 0, timer: 30 });
                }
            });

            // ⚡ 修正後的安全監聽器：移除 .on('value') 造成的重整死循環，改用精準邏輯
            db.ref(`room/players/${myName}`).set({ score: totalScore, lastScore: 0 });

            db.ref('room/players').on('value', snapshot => {
                if(snapshot.exists()) {
                    const players = snapshot.val();
                    document.getElementById('lobby-count').innerText = Object.keys(players).length;
                    
                    // 如果自己不是關主，且發現自己的節點在資料庫中憑空消失了 ➔ 代表被關主重置踢出了
                    if (!isHost && !players[myName]) {
                        // 關閉所有資料庫監聽，乾淨登出
                        db.ref('room/state').off();
                        db.ref('room/players').off();
                        db.ref(`room/players/${myName}`).off();
                        
                        alert("遊戲已由主辦人重置，請重新輸入暱稱加入！");
                        
                        // 重置前端狀態，退回登入畫面
                        totalScore = 0;
                        document.getElementById('my-score').innerText = 0;
                        hasLocked = false;
                        currentGuess = null;
                        document.getElementById('join-btn').disabled = false;
                        switchScreen('login-screen');
                    }
                }
            });

            db.ref('room/state').on('value', snapshot => {
                const state = snapshot.val();
                if (!state) return;

                activeRound = state.round;

                if (isHost && state.status === "playing" && !hostClockInterval) {
                    resumeHostClock(state.round, state.timer);
                }

                if (state.status === "lobby") {
                    hasLocked = false; currentGuess = null;
                    document.getElementById('reveal-panel').style.display = 'none';
                    if (isHost) switchScreen('lobby-screen');
                } else if (state.status === "playing") {
                    startRoundUI(state.round, state.timer);
                } else if (state.status === "reveal") {
                    revealAnswerUI(state.round);
                } else if (state.status === "ranking") {
                    showRankUI(state.round, state.timer);
                } else if (state.status === "finished") {
                    showFinalUI();
                }
            });
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').style.display = 'none';
            if (id === 'game-screen') document.getElementById('game-screen').style.display = 'flex';
            else document.getElementById(id).classList.add('active');
        }

        function startRoundUI(roundIdx, serverTimer) {
            switchScreen('game-screen');
            initMap();
            
            document.getElementById('reveal-panel').style.display = 'none';
            
            if (correctMarker) { map.removeLayer(correctMarker); correctMarker = null; }
            if (linePath) { map.removeLayer(linePath); linePath = null; }
            
            if (!hasLocked) {
                document.getElementById('lock-btn').style.display = 'block';
                document.getElementById('lock-btn').disabled = false;
                document.getElementById('lock-btn').style.background = "#06d6a0";
                document.getElementById('lock-btn').innerText = "鎖定此地點！";
            }
            
            document.getElementById('round-num').innerText = roundIdx + 1;
            document.getElementById('timer').innerText = serverTimer + "s";
            document.getElementById('current-img').src = `./photos/${quizData[roundIdx].file}`;
            
            if (serverTimer <= 0 && !hasLocked) {
                lockAnswer(true);
            }
        }

        function lockAnswer(isAutoTimeout = false) {
            hasLocked = true;
            document.getElementById('lock-btn').disabled = true;
            document.getElementById('lock-btn').style.background = "#4c4c52";
            document.getElementById('lock-btn').innerText = isAutoTimeout ? "時間到！已自動送出" : "已鎖定，等待時間結束...";

            let roundScore = 0;
            const target = quizData[activeRound];

            if (currentGuess) {
                const dist = getDistance(currentGuess.lat, currentGuess.lng, target.lat, target.lng);
                roundScore = Math.max(0, 5000 - Math.round(dist * 12));
                totalScore += roundScore;
            }

            document.getElementById('my-score').innerText = totalScore;
            db.ref(`room/players/${myName}`).update({ score: totalScore, lastScore: roundScore });
        }

        function revealAnswerUI(roundIdx) {
            switchScreen('game-screen');
            document.getElementById('lock-btn').style.display = 'none';
            document.getElementById('timer').innerText = "已開牌";
            
            const target = quizData[roundIdx];
            let dist = null;

            if (currentGuess) {
                dist = getDistance(currentGuess.lat, currentGuess.lng, target.lat, target.lng);
                document.getElementById('reveal-dist-text').innerText = `📐 你的誤差距離：${dist.toFixed(2)} 公里`;
            } else {
                document.getElementById('reveal-dist-text').innerText = `❌ 你這回合沒有選定任何地方！`;
            }

            document.getElementById('reveal-panel').style.display = 'block';

            if (map) {
                if (!correctMarker) {
                    correctMarker = L.marker([target.lat, target.lng], {
                        icon: L.icon({
                            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
                            iconSize: [25, 41], iconAnchor: [12, 41]
                        })
                    }).addTo(map).bindPopup("✨ 正確答案在此！").openPopup();
                }

                if (currentGuess && !linePath) {
                    linePath = L.polyline([currentGuess, [target.lat, target.lng]], {color: '#ff4757', weight: 4, dashArray: '5, 10'}).addTo(map);
                    const group = new L.featureGroup([guessMarker, correctMarker]);
                    map.fitBounds(group.getBounds().pad(0.2));
                } else {
                    map.setView([target.lat, target.lng], 10);
                }
            }
            hasLocked = false; 
        }

        function showRankUI(roundIdx, serverTimer) {
            switchScreen('rank-screen');
            document.getElementById('rank-title').innerText = `第 ${roundIdx + 1} 輪 結束排行`;
            
            if (isHost) {
                document.getElementById('next-round-hint').innerText = "👑 您是關主，請點擊下方按鈕推進下一關。";
            } else {
                document.getElementById('next-round-hint').innerText = "等待關主開啟下一輪題目...";
            }

            db.ref('room/players').once('value', snapshot => {
                const players = snapshot.val() || {};
                const sorted = Object.keys(players)
                    .map(key => ({ name: key, ...players[key] }))
                    .sort((a, b) => b.score - a.score);

                const container = document.getElementById('rank-container');
                container.innerHTML = "";
                sorted.forEach((p, idx) => {
                    container.innerHTML += `
                        <div class="rank-item">
                            <span>#${idx+1} ${p.name}</span>
                            <span>${p.score}分 (+${p.lastScore || 0})</span>
                        </div>`;
                });
            });
        }

        function showFinalUI() {
            switchScreen('rank-screen');
            document.getElementById('rank-title').innerText = `🏆 最終大結算 🏆`;
            document.getElementById('next-round-hint').innerText = "🎉 破冰遊戲圓滿結束！";
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ==========================================
        // 👑 關主主控大腦
        // ==========================================
        function hostChangeState(status, round, timer = 30) {
            if (!isHost) return;
            db.ref('room/state').set({ status: status, round: round, timer: timer });
            if (status === 'playing') runHostClock(round, timer);
        }

        function runHostClock(roundIdx, duration) {
            if (hostClockInterval) clearInterval(hostClockInterval);
            let currentTimer = duration;

            hostClockInterval = setInterval(() => {
                currentTimer--;
                db.ref('room/state').update({ timer: currentTimer });
                
                if (currentTimer <= 0) {
                    clearInterval(hostClockInterval);
                    hostClockInterval = null;
                    db.ref('room/state').update({ status: "reveal" });
                }
            }, 1000);
        }

        function resumeHostClock(roundIdx, remainingTime) {
            if (remainingTime > 0) runHostClock(roundIdx, remainingTime);
        }

        function hostNextRound() {
            if (!isHost) return;
            if (hostClockInterval) clearInterval(hostClockInterval);
            
            let nextRound = activeRound + 1;
            if (nextRound >= quizData.length) {
                db.ref('room/state').update({ status: "finished" });
            } else {
                db.ref('room/players').once('value', snapshot => {
                    const players = snapshot.val() || {};
                    Object.keys(players).forEach(name => {
                        db.ref(`room/players/${name}`).update({ lastScore: 0 });
                    });
                });
                hostChangeState('playing', nextRound, 30);
            }
        }

        // 🔄 徹底修復的重置清空邏輯：安全踢出，絕不造成死循環
        function hostResetEntireGame() {
            if (!isHost) return;
            if (hostClockInterval) clearInterval(hostClockInterval);
            hostClockInterval = null;

            if (confirm("💥 警告：這會把除了你以外的「所有玩家踢回登入畫面」並清除全部分數，確定要重開嗎？")) {
                // 先把狀態機退回 lobby
                db.ref('room/state').set({ status: "lobby", round: 0, timer: 30 }).then(() => {
                    // 隨後清空所有玩家
                    db.ref('room/players').remove().then(() => {
                        // 僅把關主自己重新加回 room/players
                        db.ref(`room/players/${myName}`).set({ score: 0, lastScore: 0 });
                    });
                });
                
                totalScore = 0;
                document.getElementById('my-score').innerText = 0;
                hasLocked = false;
                currentGuess = null;
            }
        }
    </script>
</body>
</html>
